<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>月曆頁｜手機版月曆記事板</title>
    <link rel="stylesheet" href="./style.css?v=15.0" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./script.js?v=15.0" defer></script>
  </head>
  <body data-page="calendar">
    <main class="page-shell">
      <section class="panel calendar-page-panel">
        <header class="topbar topbar--app">
          <div>
            <p class="eyebrow">月曆頁</p>
            <h1>我的月曆記事</h1>
          </div>

          <div class="topbar-actions">
            <a class="secondary-button" href="./index.html">回資料管理頁</a>
          </div>
        </header>

        <section class="panel calendar-toolbar">
          <div class="calendar-title-wrap">
            <p class="eyebrow">當前月份</p>
            <h2 id="calendar-month-title">載入中...</h2>
          </div>

          <div class="calendar-nav-grid">
            <button type="button" class="ghost-button" id="prev-month-button">上個月</button>
            <button type="button" class="secondary-button" id="current-month-button">當月</button>
            <button type="button" class="ghost-button" id="next-month-button">下個月</button>
          </div>
        </section>

        <section class="panel calendar-grid-panel">
          <div class="weekday-row" aria-hidden="true">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
          </div>

          <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <section class="panel detail-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">當日明細</p>
              <h3 id="selected-date-title">請先點擊日期</h3>
            </div>
            <span class="date-chip" id="selected-date-chip">未選擇</span>
          </div>

          <p id="calendar-status" class="status-message" aria-live="polite"></p>
          <ul id="selected-date-list" class="entry-list detail-list"></ul>
        </section>
      </section>
    </main>

    <div class="modal hidden" id="event-modal" aria-hidden="true">
      <div class="modal-backdrop" data-modal-close></div>
      <section
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <header class="modal-header">
          <div>
            <h3 id="modal-title">新增記事</h3>
            <p id="modal-subtitle" class="muted-text modal-subtitle"></p>
          </div>
          <button type="button" class="modal-close-button" id="modal-close-button" aria-label="關閉視窗">
            ×
          </button>
        </header>

        <form id="event-form" class="modal-form">
          <div class="modal-field-grid modal-field-grid--two">
            <div class="input-group">
              <label class="field-label" for="modal-date">日期</label>
              <input id="modal-date" type="date" class="text-input" required />
            </div>

            <div class="input-group">
              <label class="field-label" for="modal-event-time">時間</label>
              <select id="modal-event-time" class="text-input"></select>
            </div>
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-reminder-time">⏰ 設定鬧鐘</label>
            <select id="modal-reminder-time" class="text-input">
              <option value="">不需要提醒</option>
            </select>
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-title-input">主題</label>
            <input
              id="modal-title-input"
              type="text"
              class="text-input"
              list="title-suggestions"
              placeholder="可自由輸入，也可選擇建議主題"
              required
            />
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-emoji">主題 Emoji</label>
            <input
              id="modal-emoji"
              type="text"
              class="text-input text-input--emoji-entry"
              inputmode="text"
              enterkeyhint="done"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              placeholder="請輸入 1 個 Emoji"
              required
            />
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-description">備註</label>
            <textarea
              id="modal-description"
              class="text-input note-input"
              rows="4"
              placeholder="補充今天的行程內容"
            ></textarea>
          </div>

          <div class="input-group">
            <label class="field-label">自訂月曆格子底色</label>
            <div class="modal-color-picker">
              <input type="color" id="modal-bg-color" value="#ffffff" class="modal-color-picker__input" />
              <span class="modal-color-picker__hint">點擊方塊選擇專屬顏色</span>
            </div>
          </div>

          <p id="modal-status" class="status-message" aria-live="polite"></p>

          <div class="modal-actions">
            <button
              type="button"
              class="danger-button"
              id="modal-delete-button"
              style="display: none;"
            >
              刪除記事
            </button>
            <button type="submit" class="primary-button" id="modal-submit-button">儲存</button>
            <button type="button" class="ghost-button" id="modal-cancel-button">取消</button>
          </div>
        </form>
      </section>
    </div>

    <datalist id="title-suggestions">
      <option value="針灸"></option>
      <option value="旅行"></option>
      <option value="假期"></option>
      <option value="慶祝"></option>
      <option value="生日"></option>
    </datalist>

  </body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月曆記事板｜月曆顯示</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="calendar">
  <section id="authScreen" class="auth-shell">
    <div class="auth-card">
      <div class="auth-intro">
        <p class="eyebrow">雲端同步版本</p>
        <h1>登入查看月曆</h1>
        <p class="subtitle">登入之後就可以喺唔同裝置同步查看同一個帳號嘅所有日曆資料。</p>
      </div>

      <div id="authMessage" class="auth-message" hidden></div>

      <div class="auth-grid">
        <form id="loginForm" class="auth-form">
          <h2>登入</h2>
          <label class="field">
            <span>Email</span>
            <input id="loginEmail" name="loginEmail" type="email" placeholder="name@example.com" required>
          </label>
          <label class="field">
            <span>密碼</span>
            <input id="loginPassword" name="loginPassword" type="password" placeholder="請輸入密碼" required>
          </label>
          <button class="primary-button full-width" type="submit">登入帳號</button>
        </form>

        <form id="registerForm" class="auth-form">
          <h2>註冊</h2>
          <label class="field">
            <span>Email</span>
            <input id="registerEmail" name="registerEmail" type="email" placeholder="name@example.com" required>
          </label>
          <label class="field">
            <span>密碼</span>
            <input id="registerPassword" name="registerPassword" type="password" placeholder="至少 6 個字元" minlength="6" required>
          </label>
          <button class="secondary-button full-width" type="submit">建立帳號</button>
        </form>
      </div>
    </div>
  </section>

  <div id="appScreen" class="app-shell" hidden>
    <nav class="top-nav">
      <a class="nav-link" href="./index.html">資料管理</a>
      <a class="nav-link is-active" href="./calendar.html">月曆顯示</a>
    </nav>

    <header class="hero">
      <div>
        <p class="eyebrow">Supabase 雲端同步</p>
        <h1>月曆顯示頁</h1>
        <p class="subtitle">月曆會依日期同時間排序顯示，時間由 `0000` 到 `2359` 順序排列。</p>
      </div>
      <div class="hero-actions hero-actions-stack">
        <div class="account-panel">
          <span id="userEmail" class="user-email">未登入</span>
          <button id="logoutButton" class="secondary-button" type="button">登出</button>
        </div>
        <div class="action-row">
          <a class="primary-link-button" href="./index.html">前往資料管理</a>
        </div>
        <p id="syncStatus" class="sync-status">準備同步</p>
      </div>
    </header>

    <main class="single-layout">
      <section class="panel">
        <div class="panel-header calendar-header">
          <div>
            <h2>月曆檢視</h2>
            <p id="calendarTitle">2026 年 6 月</p>
          </div>
          <div class="calendar-nav">
            <button id="prevMonthButton" type="button">上個月</button>
            <button id="todayButton" type="button">今個月</button>
            <button id="nextMonthButton" type="button">下個月</button>
          </div>
        </div>

        <div class="weekday-row">
          <span>日</span>
          <span>一</span>
          <span>二</span>
          <span>三</span>
          <span>四</span>
          <span>五</span>
          <span>六</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>
    </main>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./script.js"></script>
</body>
</html>

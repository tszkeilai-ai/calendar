<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>資料管理頁｜手機版月曆記事板</title>
    <link rel="stylesheet" href="./style.css?v=16.0" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./script.js?v=16.0" defer></script>
  </head>
  <body data-page="index">
    <main class="page-shell">
      <section id="auth-section" class="panel auth-panel">
        <div class="brand-block">
          <p class="eyebrow">手機版月曆記事板</p>
          <h1>登入後開始管理記事</h1>
          <p class="muted-text">可在資料管理頁與月曆頁共用同一套記事內容、提醒時間與格子底色。</p>
        </div>

        <div class="auth-switch" role="tablist" aria-label="登入或註冊">
          <button type="button" class="tab-button is-active" id="login-tab">登入</button>
          <button type="button" class="tab-button" id="register-tab">註冊</button>
        </div>

        <form id="auth-form" class="auth-form">
          <div class="input-group">
            <label class="field-label" for="auth-email">電子郵件</label>
            <input
              id="auth-email"
              type="email"
              class="text-input"
              placeholder="請輸入電子郵件"
              autocomplete="email"
              required
            />
          </div>

          <div class="input-group">
            <label class="field-label" for="auth-password">密碼</label>
            <input
              id="auth-password"
              type="password"
              class="text-input"
              placeholder="請輸入密碼"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" class="primary-button" id="auth-submit-button">登入</button>
          <p id="auth-message" class="status-message" aria-live="polite"></p>
        </form>
      </section>

      <section id="app-section" class="panel app-panel hidden">
        <header class="topbar topbar--app">
          <div>
            <p class="eyebrow">資料管理頁</p>
            <h1>我的記事資料</h1>
          </div>

          <div class="topbar-actions">
            <a class="secondary-button" href="./calendar.html">前往月曆頁</a>
            <button type="button" class="primary-button" id="open-create-modal-button">新增記事</button>
            <button type="button" class="ghost-button" id="logout-button">登出</button>
          </div>
        </header>

        <section class="panel filter-panel filter-panel--compact">
          <div class="section-heading section-heading--compact">
            <div>
              <p class="eyebrow">篩選條件</p>
              <h2>從指定日期往後查看</h2>
            </div>
            <div class="topbar-actions">
              <span class="date-chip" id="current-date-label">今天起</span>
              <button type="button" class="ghost-button ghost-button--small" id="clear-filter-button">
                清除篩選
              </button>
            </div>
          </div>

          <div class="filter-scroller">
            <label class="compact-field" for="filter-date">
              指定日期
              <input id="filter-date" type="date" class="text-input text-input--compact" />
            </label>

            <label class="compact-field" for="filter-month">
              指定月份
              <input id="filter-month" type="month" class="text-input text-input--compact" />
            </label>
          </div>
        </section>

        <section class="panel list-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">記事列表</p>
              <h2>近期與未來行程</h2>
            </div>
          </div>

          <p id="list-status" class="status-message" aria-live="polite"></p>
          <ul id="entry-list" class="entry-list"></ul>
        </section>
      </section>
    </main>

    <div class="modal hidden" id="event-modal" aria-hidden="true">
      <div class="modal-backdrop" data-modal-close></div>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <header class="modal-header">
          <div>
            <h3 id="modal-title">新增記事</h3>
            <p id="modal-subtitle" class="muted-text modal-subtitle"></p>
          </div>
          <button type="button" class="modal-close-button" id="modal-close-button" aria-label="關閉視窗">
            ×
          </button>
        </header>

        <form id="event-form" class="modal-form">
          <div class="modal-field-grid modal-field-grid--two">
            <div class="input-group">
              <label class="field-label" for="modal-date">日期</label>
              <input id="modal-date" type="date" class="text-input" required />
            </div>

            <div class="input-group">
              <label class="field-label" for="modal-event-time">時間</label>
              <select id="modal-event-time" class="text-input"></select>
            </div>
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-reminder-time">⏰ 設定鬧鐘</label>
            <select id="modal-reminder-time" class="text-input">
              <option value="">不需要提醒</option>
            </select>
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-title-input">主題</label>
            <input
              id="modal-title-input"
              type="text"
              class="text-input"
              list="title-suggestions"
              placeholder="可自由輸入，也可選擇建議主題"
              required
            />
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-emoji">主題 Emoji</label>
            <input
              id="modal-emoji"
              type="text"
              class="text-input text-input--emoji-entry"
              inputmode="text"
              enterkeyhint="done"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              placeholder="請輸入 1 個 Emoji"
              required
            />
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-description">備註</label>
            <textarea
              id="modal-description"
              class="text-input note-input"
              rows="4"
              placeholder="補充今天的行程內容"
            ></textarea>
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-bg-color">自訂月曆格子底色</label>
            <div class="modal-color-picker">
              <input type="color" id="modal-bg-color" value="#ffffff" class="modal-color-picker__input" />
              <span class="modal-color-picker__hint">點擊方塊選擇專屬顏色</span>
            </div>
          </div>

          <p id="modal-status" class="status-message" aria-live="polite"></p>

          <div class="modal-actions">
            <button type="button" class="danger-button" id="modal-delete-button" style="display: none;">
              刪除記事
            </button>
            <button type="submit" class="primary-button" id="modal-submit-button">儲存</button>
            <button type="button" class="ghost-button" id="modal-cancel-button">取消</button>
          </div>
        </form>
      </section>
    </div>

    <datalist id="title-suggestions">
      <option value="針灸"></option>
      <option value="旅行"></option>
      <option value="假期"></option>
      <option value="慶祝"></option>
      <option value="生日"></option>
    </datalist>
  </body>
</html>

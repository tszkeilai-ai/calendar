<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手機版月曆記事板</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./script.js" defer></script>
  </head>
  <body data-page="index">
    <main class="page-shell">
      <section class="panel auth-panel" id="auth-section">
        <div class="brand-block">
          <p class="eyebrow">Supabase 雲端同步</p>
          <h1>手機版月曆記事板</h1>
          <p class="muted-text">
            先登入或註冊帳號，登入後即可在手機上快速管理記事，並切換到月曆頁查看每日安排。
          </p>
        </div>

        <div class="auth-switch" role="tablist" aria-label="登入或註冊">
          <button
            type="button"
            class="tab-button is-active"
            id="login-tab"
            data-mode="login"
          >
            登入
          </button>
          <button type="button" class="tab-button" id="register-tab" data-mode="register">
            註冊
          </button>
        </div>

        <form id="auth-form" class="auth-form">
          <div class="input-group">
            <label class="field-label" for="auth-email">電子郵件</label>
            <input
              id="auth-email"
              name="email"
              type="email"
              class="text-input"
              autocomplete="email"
              placeholder="請輸入電子郵件"
              required
            />
          </div>

          <div class="input-group">
            <label class="field-label" for="auth-password">密碼</label>
            <input
              id="auth-password"
              name="password"
              type="password"
              class="text-input"
              autocomplete="current-password"
              placeholder="請輸入至少 6 碼密碼"
              minlength="6"
              required
            />
          </div>

          <button type="submit" class="primary-button" id="auth-submit-button">登入</button>
        </form>

        <p id="auth-message" class="status-message" aria-live="polite"></p>
      </section>

      <section class="panel app-panel hidden" id="app-section">
        <header class="topbar topbar--app">
          <div>
            <p class="eyebrow">資料管理頁</p>
            <h2>我的記事列表</h2>
          </div>

          <div class="topbar-actions">
            <a class="secondary-button" href="./calendar.html">前往月曆頁</a>
            <button type="button" class="primary-button" id="open-create-modal-button">
              新增記事
            </button>
            <button type="button" class="ghost-button" id="logout-button">登出</button>
          </div>
        </header>

        <section class="panel filter-panel filter-panel--compact">
          <div class="section-heading section-heading--compact">
            <div>
              <p class="eyebrow">歷史資料篩選器</p>
              <h3>快速篩選</h3>
            </div>
            <span id="current-date-label" class="date-chip">全部</span>
          </div>

          <div class="filter-scroller" aria-label="歷史資料篩選器">
            <label class="compact-field">
              <span>日期</span>
              <input id="filter-date" type="date" class="text-input text-input--compact" />
            </label>

            <label class="compact-field">
              <span>月份</span>
              <input id="filter-month" type="month" class="text-input text-input--compact" />
            </label>

            <button type="button" class="ghost-button ghost-button--small" id="clear-filter-button">
              顯示全部
            </button>
          </div>
        </section>

        <section class="panel list-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">即時更新</p>
              <h3>記事列表</h3>
            </div>
          </div>

          <p id="list-status" class="status-message" aria-live="polite"></p>
          <ul id="entry-list" class="entry-list"></ul>
        </section>
      </section>
    </main>

    <div class="modal hidden" id="event-modal" aria-hidden="true">
      <div class="modal-backdrop" data-modal-close></div>
      <section
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <header class="modal-header">
          <div>
            <h3 id="modal-title">新增記事</h3>
            <p id="modal-subtitle" class="muted-text modal-subtitle"></p>
          </div>
          <button type="button" class="modal-close-button" id="modal-close-button" aria-label="關閉視窗">
            ×
          </button>
        </header>

        <form id="event-form" class="modal-form">
          <div class="input-group">
            <label class="field-label" for="modal-date">日期</label>
            <input id="modal-date" type="date" class="text-input" required />
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-time">時間</label>
            <input id="modal-time" type="time" class="text-input" required />
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-title-input">主題</label>
            <input
              id="modal-title-input"
              type="text"
              class="text-input"
              list="title-suggestions"
              placeholder="可自由輸入，也可選擇建議主題"
              required
            />
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-emoji">主題 Emoji</label>
            <input
              id="modal-emoji"
              type="text"
              class="text-input"
              list="emoji-suggestions"
              placeholder="例如 🩺✈️🎂🎉（最多 4 個）"
              inputmode="text"
            />
          </div>

          <div class="input-group">
            <label class="field-label" for="modal-description">備註</label>
            <textarea
              id="modal-description"
              class="text-input note-input"
              rows="4"
              placeholder="補充今天的行程內容"
            ></textarea>
          </div>

          <p id="modal-status" class="status-message" aria-live="polite"></p>

          <div class="modal-actions">
            <button type="submit" class="primary-button" id="modal-submit-button">儲存</button>
            <button type="button" class="ghost-button" id="modal-cancel-button">取消</button>
          </div>
        </form>
      </section>
    </div>

    <datalist id="title-suggestions">
      <option value="針灸"></option>
      <option value="旅行"></option>
      <option value="假期"></option>
      <option value="慶祝"></option>
      <option value="生日"></option>
    </datalist>

    <datalist id="emoji-suggestions">
      <option value="🩺"></option>
      <option value="✈️"></option>
      <option value="🎂"></option>
      <option value="🎉"></option>
      <option value="🏖️"></option>
      <option value="📚"></option>
      <option value="💼"></option>
    </datalist>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月曆記事板｜資料管理</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="manage">
  <section id="authScreen" class="auth-shell">
    <div class="auth-card">
      <div class="auth-intro">
        <p class="eyebrow">雲端同步版本</p>
        <h1>登入月曆記事板</h1>
        <p class="subtitle">用 Email 同密碼登入後，你嘅日曆資料會自動同步到唔同手機、平板同電腦。</p>
      </div>

      <div id="authMessage" class="auth-message" hidden></div>

      <div class="auth-grid">
        <form id="loginForm" class="auth-form">
          <h2>登入</h2>
          <label class="field">
            <span>Email</span>
            <input id="loginEmail" name="loginEmail" type="email" placeholder="name@example.com" required>
          </label>
          <label class="field">
            <span>密碼</span>
            <input id="loginPassword" name="loginPassword" type="password" placeholder="請輸入密碼" required>
          </label>
          <button class="primary-button full-width" type="submit">登入帳號</button>
        </form>

        <form id="registerForm" class="auth-form">
          <h2>註冊</h2>
          <label class="field">
            <span>Email</span>
            <input id="registerEmail" name="registerEmail" type="email" placeholder="name@example.com" required>
          </label>
          <label class="field">
            <span>密碼</span>
            <input id="registerPassword" name="registerPassword" type="password" placeholder="至少 6 個字元" minlength="6" required>
          </label>
          <button class="secondary-button full-width" type="submit">建立帳號</button>
        </form>
      </div>
    </div>
  </section>

  <div id="appScreen" class="app-shell" hidden>
    <nav class="top-nav">
      <a class="nav-link is-active" href="./index.html">資料管理</a>
      <a class="nav-link" href="./calendar.html">月曆顯示</a>
    </nav>

    <header class="hero">
      <div>
        <p class="eyebrow">Supabase 雲端同步</p>
        <h1>資料管理頁</h1>
        <p class="subtitle">頂部可快速連續新增資料，下方列表可再修改、刪除同同步到雲端。</p>
      </div>
      <div class="hero-actions hero-actions-stack">
        <div class="account-panel">
          <span id="userEmail" class="user-email">未登入</span>
          <button id="logoutButton" class="secondary-button" type="button">登出</button>
        </div>
        <div class="action-row">
          <button id="saveButton" class="secondary-button" type="button">立即同步</button>
        </div>
        <p id="syncStatus" class="sync-status">準備同步</p>
      </div>
    </header>

    <main class="single-layout">
      <section class="panel quick-entry-panel">
        <div class="panel-header quick-entry-header">
          <div>
            <h2>快捷輸入</h2>
            <p id="quickAddTarget">未設定指定日期時，新增項目會自動加入今天。</p>
          </div>
          <button id="toggleFilterButton" class="secondary-button filter-toggle-button" type="button" aria-expanded="false" aria-controls="filterPanel">搜尋</button>
        </div>

        <form id="quickAddForm" class="quick-entry-form">
          <label class="field">
            <span>時間</span>
            <input id="quickTimeInput" name="quickTimeInput" type="time">
          </label>
          <label class="field">
            <span>主題</span>
            <select id="quickCategoryInput" name="quickCategoryInput">
              <option value="生日">生日</option>
              <option value="工作" selected>工作</option>
              <option value="假期">假期</option>
              <option value="日常">日常</option>
              <option value="開餐">開餐</option>
              <option value="娛樂">娛樂</option>
            </select>
          </label>
          <label class="field quick-note-field">
            <span>備註</span>
            <input id="quickNoteInput" name="quickNoteInput" type="text" placeholder="輸入備註後按新增">
          </label>
          <button id="quickAddButton" class="primary-button quick-add-button" type="submit">新增</button>
        </form>
      </section>

      <section id="filterPanel" class="panel filter-panel" hidden>
        <div class="panel-header">
          <div>
            <h2>搜尋與篩選</h2>
            <p>支援指定日期、開始日期、結束日期，方便之後查找同修改。</p>
          </div>
        </div>

        <div class="filter-bar">
          <label class="field">
            <span>指定日期</span>
            <input id="filterExactDate" type="date">
          </label>
          <label class="field">
            <span>開始日期</span>
            <input id="filterStartDate" type="date">
          </label>
          <label class="field">
            <span>結束日期</span>
            <input id="filterEndDate" type="date">
          </label>
          <div class="filter-actions">
            <button id="resetFilterButton" type="button">清除篩選</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>表格式輸入</h2>
            <p id="filterSummary">可直接像 Excel 一樣逐行輸入，再同步到雲端。</p>
          </div>
          <div class="panel-tools">
            <button id="sampleButton" type="button">載入示例</button>
            <button id="clearButton" type="button" class="danger-button">清空全部</button>
          </div>
        </div>

        <div class="table-wrap">
          <table class="manage-table">
            <thead>
              <tr>
                <th>日期</th>
                <th>時間</th>
                <th>主題</th>
                <th>備註</th>
                <th>顏色</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="entryTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <template id="entryRowTemplate">
    <tr>
      <td data-label="日期">
        <input class="entry-date" type="date">
      </td>
      <td data-label="時間">
        <input class="entry-time" type="time">
      </td>
      <td data-label="主題">
        <select class="entry-category">
          <option value="生日">生日</option>
          <option value="工作">工作</option>
          <option value="假期">假期</option>
          <option value="日常">日常</option>
          <option value="開餐">開餐</option>
          <option value="娛樂">娛樂</option>
        </select>
      </td>
      <td data-label="備註">
        <input class="entry-note" type="text" placeholder="輸入備註">
      </td>
      <td data-label="顏色">
        <input class="entry-color" type="color" value="#4f46e5">
      </td>
      <td data-label="操作">
        <button class="delete-row-button" type="button">刪除</button>
      </td>
    </tr>
  </template>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./script.js"></script>
</body>
</html>

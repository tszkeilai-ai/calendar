<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月曆記事板</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <nav class="top-nav">
      <a class="nav-link is-active" href="./index.html">資料管理</a>
      <a class="nav-link" href="./calendar.html">月曆顯示</a>
    </nav>

    <header class="hero">
      <div>
        <p class="eyebrow">GitHub 專案版本</p>
        <h1>資料管理頁</h1>
        <p class="subtitle">先用表格方式輸入、篩選同修改資料，再去月曆頁查看內容。</p>
      </div>
      <div class="hero-actions">
        <button id="addRowButton" class="primary-button" type="button">新增項目</button>
        <button id="saveButton" class="secondary-button" type="button">儲存資料</button>
      </div>
    </header>

    <main class="single-layout">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>日期篩選</h2>
            <p>可用單一日期或開始、結束日期查找，方便之後修改或刪除。</p>
          </div>
        </div>

        <div class="filter-bar">
          <label class="field">
            <span>指定日期</span>
            <input id="filterExactDate" type="date">
          </label>
          <label class="field">
            <span>開始日期</span>
            <input id="filterStartDate" type="date">
          </label>
          <label class="field">
            <span>結束日期</span>
            <input id="filterEndDate" type="date">
          </label>
          <div class="filter-actions">
            <button id="resetFilterButton" type="button">清除篩選</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>表格式輸入</h2>
            <p id="filterSummary">可直接像 Excel 一樣逐行輸入。</p>
          </div>
          <div class="panel-tools">
            <button id="sampleButton" type="button">載入示例</button>
            <button id="clearButton" type="button" class="danger-button">清空全部</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>主題</th>
                <th>備註</th>
                <th>顏色</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="entryTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <template id="entryRowTemplate">
    <tr>
      <td>
        <input class="entry-date" type="date">
      </td>
      <td>
        <select class="entry-category">
          <option value="生日">生日</option>
          <option value="工作">工作</option>
          <option value="假期">假期</option>
          <option value="日常">日常</option>
          <option value="開餐">開餐</option>
          <option value="娛樂">娛樂</option>
        </select>
      </td>
      <td>
        <input class="entry-note" type="text" placeholder="輸入備註">
      </td>
      <td>
        <input class="entry-color" type="color" value="#4f46e5">
      </td>
      <td>
        <button class="delete-row-button" type="button">刪除</button>
      </td>
    </tr>
  </template>

  <script src="./script.js"></script>
</body>
</html>
